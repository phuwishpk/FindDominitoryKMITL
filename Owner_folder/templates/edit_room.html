{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2>แก้ไขห้องพัก</h2>
    <form method="post" action="{{ url_for('edit_room', room_id=room.id) }}">
        <div class="mb-3">
            <label for="room_type" class="form-label">ประเภทห้อง</label>
            <input type="text" class="form-control" id="room_type" name="room_type" value="{{ room.room_type }}" required>
        </div>
        <div class="mb-3">
            <label for="price" class="form-label">ราคา (บาท)</label>
            <input type="number" step="0.01" class="form-control" id="price" name="price" value="{{ room.price }}" required>
        </div>
        <div class="mb-3">
            <label for="room_count" class="form-label">จำนวนห้อง</label>
            <input type="number" class="form-control" id="room_count" name="room_count" value="{{ room.room_count }}" required>
        </div>
        <div class="mb-3">
            <label for="images" class="form-label">รูปภาพ (URL)</label>
            {% set images = room.images | from_json %}
            {% if images %}
                {% for image_url in images %}
                    <input type="text" class="form-control mb-2" name="images" value="{{ image_url }}">
                {% endfor %}
            {% else %}
                <input type="text" class="form-control" name="images">
            {% endif %}
            <div id="image-input-container" class="mt-2"></div>
            <button type="button" class="btn btn-sm btn-secondary" onclick="addImageInput()">เพิ่มรูปภาพ</button>
        </div>
        <button type="submit" class="btn btn-primary">บันทึกการแก้ไข</button>
        <a href="{{ url_for('dorm_details', dorm_id=room.dorm_id) }}" class="btn btn-secondary">ยกเลิก</a>
    </form>
</div>

<script>
    function addImageInput() {
        var container = document.getElementById('image-input-container');
        var input = document.createElement('input');
        input.type = 'text';
        input.className = 'form-control mb-2';
        input.name = 'images';
        container.appendChild(input);
    }
</script>
{% endblock %}
